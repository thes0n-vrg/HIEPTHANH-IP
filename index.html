<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="utf-8" />
<title>KCN Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Draw -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<!-- CSS -->
<style>
html, body, #map {
  height: 100%;
  margin: 0;
}

.kcn-label {
  font-size: 20px;
  color: #d32f2f;
  font-weight: bold;
  text-align: center;
}
</style>

</head>

<body>

<div id="map"></div>

<!-- JS đúng thứ tự -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-geometryutil"></script>

<script>
// ===== BASE MAP =====
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

var satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

var hybrid = L.layerGroup([
  satellite,
  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png')
]);

// ===== MAP =====
var map = L.map('map', {
  center: [11.157, 106.26],
  zoom: 16,
  layers: [osm]
});
// ===== TOOL ĐO =====
var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

var drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: true,
    rectangle: true,
    circle: false,
    marker: false
  },
  edit: {
    featureGroup: drawnItems
  }
});
map.addControl(drawControl);

// hiển thị kết quả đo
map.on(L.Draw.Event.CREATED, function (e) {
  var layer = e.layer;
  drawnItems.addLayer(layer);

  if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
    var latlngs = layer.getLatLngs();
    var area = 0;

    latlngs.forEach(function(ring){
    area += L.GeometryUtil.geodesicArea(ring);
});
    var areaM2 = area.toFixed(0);
var areaHa = (area / 10000).toFixed(2);

layer.bindPopup(
  "Diện tích:<br>" +
  areaM2 + " m²<br>" +
  areaHa + " ha"
).openPopup();
  }

  if (e.layerType === 'polyline') {
    var latlngs = layer.getLatLngs();
    var distance = 0;
    for (var i = 0; i < latlngs.length - 1; i++) {
      distance += latlngs[i].distanceTo(latlngs[i+1]);
    }
    layer.bindPopup("Chiều dài: " + distance.toFixed(0) + " m").openPopup();
  }
});
// ===== GPS =====
map.locate({setView: true, maxZoom: 17});

map.on('locationfound', function(e) {
  L.marker(e.latlng).addTo(map)
    .bindPopup("Bạn đang ở đây").openPopup();

  L.circle(e.latlng, {radius: e.accuracy}).addTo(map);
});

// ===== STYLE ĐẤT =====
function styleDat(f) {
  let t = f.properties.dat_all;
  let c = "#999";

  if (t === "cay_xanh") c = "#4CAF50";
  if (t === "cong_nghiep") c = "#FF5722";
  if (t === "cn_nho") c = "#FF8A65";
  if (t === "dich_vu") c = "#9C27B0";
  if (t === "ha_tang") c = "#2196F3";
  if (t === "mat_nuoc") c = "#03A9F4";
  if (t === "ho_nuoc") c = "#00BCD4";
  if (t === "tien_ich") c = "#FFC107";
  if (t === "bai_xe") c = "#795548";

  return {
    color: "#222",
    weight: 1,
    fillColor: c,
    fillOpacity: 0.8
  };
}
// ===== STYLE ĐẤT CÂY XANH =====
function styleCayXanh(f) {
  return {
    color: "#1B5E20",
    weight: 1,
    fillColor: "#4CAF50",
    fillOpacity: 0.8
  };
}
// ===== STYLE ĐƯỜNG =====
function styleDuong(f) {
  let t = f.properties.duong_gt;

  if (t === "tim") {
    return {color:"#000", weight:2, dashArray:"6,6"};
  }
  if (t === "mep") {
    return {color:"#666", weight:3};
  }

  return {color:"#999"};
}
// ===== STYLE RANH KCN =====
function styleRanhKCN(f) {
  return {
    color: "#FF0000",
    weight: 2,
    dashArray: "8,6"
  };
}
// ===== STYLE CAO SU =====
function styleCaoSu(f) {
  return {
    color: "#2E7D32",
    weight: 1,
    fillColor: "#66BB6A",
    fillOpacity: 0.6
  };
}
// ===== POPUP =====
function popupDat(feature, layer) {
  layer.bindPopup("Loại đất: " + feature.properties.dat_all);
}

// ===== LOAD DATA =====
// ===== CAO SU =====
var caoSuLayer = L.geoJSON(null, {
  style: styleCaoSu
}).addTo(map);

fetch("caosu.geojson")
.then(r => r.json())
.then(d => {
  caoSuLayer.addData(d);
  caoSuLayer.bringToBack();
});
// ===== CÂY XANH RIÊNG =====
var cayXanhLayer = L.geoJSON(null, {
  style: styleCayXanh
}).addTo(map);

fetch("DAT_CAYXANH_POLY_FINAL2.geojson")
.then(r => r.json())
.then(d => {
  cayXanhLayer.addData(d);
});
// ĐẤT
var datLayer = L.geoJSON(null, {
  style: styleDat,
  onEachFeature: popupDat
}).addTo(map);

fetch("DAT_ALL_POLY_FINAL.geojson")
.then(r => r.json())
.then(d => {
  datLayer.addData(d);
  map.fitBounds(datLayer.getBounds());
  datLayer.bringToFront();
});

// ĐƯỜNG
var duongLayer = L.geoJSON(null, {
  style: styleDuong
}).addTo(map);

fetch("DUONG_FINAL.geojson")
.then(r => r.json())
.then(d => {
  duongLayer.addData(d);
  duongLayer.bringToFront();
});
// ===== RANH KCN =====
var ranhLayer = L.geoJSON(null, {
  style: styleRanhKCN
}).addTo(map);

fetch("RanhKCNHT.geojson")
.then(r => r.json())
.then(d => {
  ranhLayer.addData(d);
  ranhLayer.bringToFront(); 
});
// ===== CONTROL =====
L.control.layers(
  {
    "OSM": osm,
    "Satellite": satellite,
    "Hybrid": hybrid
  },
  {
    "Đất": datLayer,
    "Cây xanh": cayXanhLayer,
    "Cao su": caoSuLayer,
    "Đường": duongLayer,
    "Ranh KCN": ranhLayer
  },
  {collapsed:false}
).addTo(map);
</script>

</body>
</html>
